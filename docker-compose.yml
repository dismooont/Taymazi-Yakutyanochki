# Запуск: docker compose up -d --build
#
# Три сервиса:
#   web — API: единственное место, где живёт CLIP и куда идут все запросы
#   ui  — nginx: собранный фронтенд плюс проксирование /api на web
#   bot — Telegram-бот, тонкий HTTP-клиент web (без torch, ~150 МБ)
#
# Модель загружена ровно в одном процессе. Бот не считает эмбеддинги и не открывает
# файлы индекса: он ходит в API по служебному токену, поэтому квоты, очередь задач
# и права доступа действуют одинаково и в чате, и на сайте.
#
# Индекс и данные монтируются как volume (не запекаются в образ) — так добавленные
# фото сразу сохраняются на диск хоста и переживают пересборку контейнера.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
    restart: unless-stopped
    env_file: .env
    environment:
      # Приложение стоит за nginx, поэтому берёт IP клиента из X-Real-IP. Без этого
      # ограничение частоты входа считало бы всех пользователей одним адресом
      # (адресом контейнера nginx), и пятая неудачная попытка кого угодно закрывала
      # бы вход сразу всем.
      TRUST_PROXY: "1"
      DATA_DIR: /app/data
    volumes:
      # Базы пользователей и app.db переживают пересборку контейнера.
      - ./data:/app/data
      # Индекс COCO подключается как демо-база только для чтения: у пользовательских
      # баз нет подписей, поэтому поиск «фото → подпись» больше негде показать.
      - ./index:/app/index:ro
    # Порт наружу не публикуется: снаружи доступен только nginx.
    expose:
      - "8000"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    restart: unless-stopped
    depends_on:
      # Иначе страница открывается, пока API ещё грузит модель, и первый же вход
      # отвечает ошибкой.
      web:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
    restart: unless-stopped
    env_file: .env
    environment:
      # внутреннее имя сервиса: наружу порт API не публикуется
      API_URL: http://web:8000
    depends_on:
      # Именно service_healthy, а не просто «запущен»: web около полуминуты грузит
      # CLIP и до этого порт не слушает. Бот же начинает разбирать накопившуюся
      # очередь Telegram сразу, и эти сообщения падали с ConnectError — со стороны
      # выглядело так, будто бот молча проглотил запрос.
      web:
        condition: service_healthy
