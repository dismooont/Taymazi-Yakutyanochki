# Запуск: docker compose up -d --build
#
# Два сервиса:
#   web — веб-API, Telegram-бот и резидентный CLIP в одном процессе
#   ui  — nginx: собранный фронтенд плюс проксирование /api на web
#
# Telegram-бот раньше был отдельным контейнером (Dockerfile, bot/). Теперь он живёт
# внутри web, и поднимать оба сразу НЕЛЬЗЯ: Telegram отдаёт обновления только одному
# потребителю getUpdates на токен, а вторая копия процесса — это ещё 600 МБ памяти
# под второй экземпляр весов CLIP и второй писатель в те же файлы индекса.
# Старый контейнер оставлен в репозитории (Dockerfile) для запуска в одиночку, без веба.
#
# Индекс и данные монтируются как volume (не запекаются в образ) — так добавленные
# фото сразу сохраняются на диск хоста и переживают пересборку контейнера.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
    restart: unless-stopped
    env_file: .env
    environment:
      # Приложение стоит за nginx, поэтому берёт IP клиента из X-Real-IP. Без этого
      # ограничение частоты входа считало бы всех пользователей одним адресом
      # (адресом контейнера nginx), и пятая неудачная попытка кого угодно закрывала
      # бы вход сразу всем.
      TRUST_PROXY: "1"
      DATA_DIR: /app/data
    volumes:
      # Базы пользователей и app.db переживают пересборку контейнера.
      - ./data:/app/data
      # Индекс COCO подключается как демо-база только для чтения: у пользовательских
      # баз нет подписей, поэтому поиск «фото → подпись» больше негде показать.
      - ./index:/app/index:ro
    # Порт наружу не публикуется: снаружи доступен только nginx.
    expose:
      - "8000"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${WEB_PORT:-8080}:80"
