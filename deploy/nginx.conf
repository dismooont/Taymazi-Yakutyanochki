# nginx перед веб-приложением: отдаёт собранную статику и проксирует /api.
#
# TLS здесь не терминируется. На сервере поставьте перед этим контейнером
# certbot/traefik или пробросьте 443 с хоста — тогда PUBLIC_URL начнётся с https,
# и приложение само включит флаг Secure у cookie сессии.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Загрузка архива с фотографиями: значение должно быть не меньше квоты
    # MAX_BYTES_PER_USER, иначе nginx оборвёт запрос раньше, чем приложение
    # успеет объяснить пользователю, что превышен лимит.
    client_max_body_size 3g;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Имена файлов сборки содержат хеш содержимого, поэтому их можно кэшировать
    # навсегда: при изменении кода меняется имя.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        # X-Real-IP приложение использует для ограничения частоты входа. Заголовок
        # проставляется здесь безусловно — то, что прислал клиент, затирается,
        # иначе лимит обходился бы подделкой заголовка.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Выгрузка базы отдаётся потоком: с буферизацией nginx копил бы весь
        # архив у себя, и скачивание начиналось бы только после его сборки.
        proxy_buffering off;
        proxy_request_buffering off;

        # Индексация большого архива и выгрузка многогигабайтной базы идут долго.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Маршруты приложения (/db/<id>) обрабатывает React Router, поэтому любой
    # неизвестный путь отдаёт index.html — иначе обновление страницы даёт 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
