# Запуск бота: docker compose up -d --build
#
# Индекс и данные монтируются как volume (не запекаются в образ) — так команда
# add / присланные пользователем фото сразу сохраняются на диск хоста и переживают
# пересборку контейнера (README, раздел 9.5).
#
# Данные COCO (data/images) монтируются, потому что бот отдаёт найденные картинки
# по путям из индекса — файлы должны быть доступны контейнеру.

services:
  bot:
    build:
      context: .
      args:
        # Прокси только для сборки за "закрытой" сетью. На сервере с прямым
        # интернетом оставить пустым (значения берутся из .env, если заданы).
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./index:/app/index                 # FAISS-индекс (растёт при добавлении фото)
      - ./data/images:/app/data/images:ro  # изображения COCO (только чтение)
      - ./data/user_photos:/app/data/user_photos  # присланные пользователем фото
